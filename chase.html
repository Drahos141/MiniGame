<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Police Chase – Mini Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="chase-app">
    <a href="index.html" class="btn-back">← Dashboard</a>
    <header>
      <h1>🚔 Police Chase</h1>
      <p class="subtitle">Outrun the cops in your Lamborghini!</p>
    </header>
    <div id="chase-player-banner" class="player-turn-banner hidden"></div>
    <div id="chase-hud">
      <div class="stat-box"><span class="stat-label">Time</span><span class="stat-value" id="chase-time">0</span></div>
      <div class="stat-box"><span class="stat-label">Best</span><span class="stat-value" id="chase-best">0</span></div>
      <div class="stat-box"><span class="stat-label">Speed</span><span class="stat-value" id="chase-speed">0</span></div>
    </div>
    <canvas id="chase-canvas" width="500" height="500"></canvas>
    <div id="chase-controls">
      <p class="control-hint">Arrow keys or WASD to steer • Avoid the police!</p>
      <button id="btn-start-chase">Start Game</button>
    </div>
    <div id="chase-message" class="hidden"></div>
  </div>
  <script src="chase.js"></script>
</body>
</html>
