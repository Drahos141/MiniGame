<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics Lab – Mini Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="physics-app">
    <div id="physics-toolbar">
      <a href="index.html" class="btn-back" style="margin:0">← Dashboard</a>
      <h1>⚙️ Physics Lab</h1>
      <button class="phys-btn" id="btn-play-physics">▶ Play</button>
      <button class="phys-btn" id="btn-clear-physics">🗑 Clear</button>
      <button class="phys-btn" id="btn-erase-physics">✏️ Erase</button>
    </div>
    <div id="physics-container">
      <div id="object-palette">
        <!-- filled by JS -->
      </div>
      <canvas id="physics-canvas" width="760" height="540"></canvas>
    </div>
    <div id="physics-status">Select an object from the palette, then click the canvas to place it. Right-click to delete. Press ▶ Play to start gravity!</div>
  </div>
  <script src="physics.js"></script>
</body>
</html>
