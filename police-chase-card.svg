<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="pcBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#030810"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <linearGradient id="pcRoad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="pcBlueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2266ff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#2266ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pcRedGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2200" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff2200" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pcNitroGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00ffaa" stop-opacity="0"/>
    </radialGradient>
    <filter id="pcBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="320" height="200" fill="url(#pcBg)"/>

  <!-- Stars -->
  <circle cx="20"  cy="12" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="45"  cy="5"  r="0.6" fill="#ffffff" opacity="0.5"/>
  <circle cx="70"  cy="18" r="0.9" fill="#ffffff" opacity="0.6"/>
  <circle cx="255" cy="8"  r="0.7" fill="#ffffff" opacity="0.6"/>
  <circle cx="280" cy="20" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="305" cy="11" r="0.6" fill="#ffffff" opacity="0.7"/>
  <circle cx="140" cy="7"  r="0.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="185" cy="4"  r="0.8" fill="#ffffff" opacity="0.6"/>

  <!-- City silhouette left -->
  <polygon points="0,65 0,200 15,200 15,55 22,55 22,40 30,40 30,45 38,45 38,60 45,60 45,200 55,200 55,80" fill="#060c1a"/>
  <rect x="14" y="42" width="4" height="4" fill="#ffff88" opacity="0.5"/>
  <rect x="24" y="50" width="3" height="3" fill="#ffff88" opacity="0.4"/>
  <rect x="32" y="48" width="4" height="4" fill="#88aaff" opacity="0.5"/>
  <rect x="5"  y="70" width="4" height="4" fill="#ffff88" opacity="0.3"/>

  <!-- City silhouette right -->
  <polygon points="265,80 265,200 275,200 275,55 282,55 282,38 292,38 292,48 300,48 300,62 308,62 308,200 320,200 320,68" fill="#060c1a"/>
  <rect x="276" cy="42" width="4" height="4" y="42" fill="#ffff88" opacity="0.5"/>
  <rect x="284" y="50" width="3" height="3" fill="#88aaff" opacity="0.4"/>
  <rect x="302" y="55" width="4" height="4" fill="#ffff88" opacity="0.5"/>
  <rect x="312" y="75" width="4" height="4" fill="#ffff88" opacity="0.3"/>

  <!-- Road surface -->
  <rect x="58" y="0" width="204" height="200" fill="url(#pcRoad)"/>

  <!-- Road edge lines -->
  <rect x="58"  y="0" width="4" height="200" fill="#dddddd"/>
  <rect x="258" y="0" width="4" height="200" fill="#dddddd"/>

  <!-- Lane dashes (4 lanes = 3 dashes) -->
  <line x1="109" y1="0"   x2="109" y2="200" stroke="#ffcc00" stroke-width="2" stroke-dasharray="18,14" opacity="0.55"/>
  <line x1="160" y1="0"   x2="160" y2="200" stroke="#ffcc00" stroke-width="2" stroke-dasharray="18,14" opacity="0.55"/>
  <line x1="211" y1="0"   x2="211" y2="200" stroke="#ffcc00" stroke-width="2" stroke-dasharray="18,14" opacity="0.55"/>

  <!-- Speed/motion blur lines behind player car -->
  <line x1="58"  y1="158" x2="0"   y2="152" stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>
  <line x1="58"  y1="168" x2="0"   y2="162" stroke="#ffffff" stroke-width="1"   opacity="0.12"/>
  <line x1="262" y1="158" x2="320" y2="152" stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>
  <line x1="262" y1="168" x2="320" y2="162" stroke="#ffffff" stroke-width="1"   opacity="0.12"/>

  <!-- Police car 1 glow -->
  <ellipse cx="100" cy="42" rx="28" ry="22" fill="url(#pcBlueGlow)" filter="url(#pcBlur)"/>
  <!-- Police car 2 glow -->
  <ellipse cx="215" cy="58" rx="28" ry="22" fill="url(#pcRedGlow)" filter="url(#pcBlur)"/>

  <!-- Police car 1 body -->
  <rect x="84"  y="18" width="26" height="46" rx="4" fill="#e8e8e8"/>
  <rect x="87"  y="20" width="20" height="12" rx="1" fill="rgba(140,200,255,0.8)"/>
  <rect x="88"  y="42" width="18" height="12" rx="1" fill="rgba(100,160,210,0.65)"/>
  <rect x="84"  y="17" width="26" height="1"  fill="#aaaaaa"/>
  <!-- Lightbar P1 -->
  <rect x="84"  y="13" width="12" height="7"  rx="1.5" fill="#0055ff"/>
  <rect x="98"  y="13" width="12" height="7"  rx="1.5" fill="#ff2200"/>
  <!-- Wheels P1 -->
  <rect x="79"  y="24" width="6"  height="12" fill="#111" rx="2"/>
  <rect x="109" y="24" width="6"  height="12" fill="#111" rx="2"/>
  <rect x="79"  y="42" width="6"  height="12" fill="#111" rx="2"/>
  <rect x="109" y="42" width="6"  height="12" fill="#111" rx="2"/>
  <!-- Headlights P1 -->
  <rect x="87"  y="18" width="6"  height="4"  fill="#fffaaa"/>
  <rect x="101" y="18" width="6"  height="4"  fill="#fffaaa"/>
  <!-- Taillights P1 -->
  <rect x="87"  y="60" width="6"  height="4"  fill="#ff3300"/>
  <rect x="101" y="60" width="6"  height="4"  fill="#ff3300"/>
  <!-- POLICE text P1 -->
  <text x="97" y="38" font-family="monospace" font-size="5" fill="#000000" text-anchor="middle" font-weight="bold">POLICE</text>
  <rect x="84" y="28" width="26" height="8" fill="rgba(0,0,0,0.18)"/>

  <!-- Police car 2 body -->
  <rect x="198" y="34" width="26" height="46" rx="4" fill="#e8e8e8"/>
  <rect x="201" y="36" width="20" height="12" rx="1" fill="rgba(140,200,255,0.8)"/>
  <rect x="202" y="58" width="18" height="12" rx="1" fill="rgba(100,160,210,0.65)"/>
  <!-- Lightbar P2 -->
  <rect x="198" y="29" width="12" height="7"  rx="1.5" fill="#ff2200"/>
  <rect x="212" y="29" width="12" height="7"  rx="1.5" fill="#0055ff"/>
  <!-- Wheels P2 -->
  <rect x="193" y="40" width="6"  height="12" fill="#111" rx="2"/>
  <rect x="223" y="40" width="6"  height="12" fill="#111" rx="2"/>
  <rect x="193" y="58" width="6"  height="12" fill="#111" rx="2"/>
  <rect x="223" y="58" width="6"  height="12" fill="#111" rx="2"/>
  <!-- Headlights P2 -->
  <rect x="201" y="34" width="6"  height="4"  fill="#fffaaa"/>
  <rect x="215" y="34" width="6"  height="4"  fill="#fffaaa"/>
  <!-- Taillights P2 -->
  <rect x="201" y="76" width="6"  height="4"  fill="#ff3300"/>
  <rect x="215" y="76" width="6"  height="4"  fill="#ff3300"/>
  <!-- POLICE text P2 -->
  <text x="211" y="54" font-family="monospace" font-size="5" fill="#000000" text-anchor="middle" font-weight="bold">POLICE</text>
  <rect x="198" y="44" width="26" height="8" fill="rgba(0,0,0,0.18)"/>

  <!-- Rocket / explosion effect between police cars -->
  <circle cx="155" cy="98" r="14" fill="#ff6600" opacity="0.6"/>
  <circle cx="155" cy="98" r="9"  fill="#ffcc00" opacity="0.85"/>
  <circle cx="155" cy="98" r="4"  fill="#ffffff"  opacity="0.95"/>
  <line x1="155" y1="80" x2="155" y2="65" stroke="#ff4400" stroke-width="3.5" opacity="0.8"/>
  <line x1="148" y1="85" x2="142" y2="73" stroke="#ff4400" stroke-width="2"   opacity="0.6"/>
  <line x1="162" y1="85" x2="168" y2="73" stroke="#ff4400" stroke-width="2"   opacity="0.6"/>

  <!-- Player car nitro glow -->
  <ellipse cx="155" cy="178" rx="22" ry="18" fill="url(#pcNitroGlow)" filter="url(#pcBlur)"/>

  <!-- Player car body (yellow/gold sports car) -->
  <rect x="142" y="148" width="26" height="46" rx="5" fill="#ffe033"/>
  <!-- Gradient overlay for 3D effect -->
  <rect x="142" y="148" width="13" height="46" rx="5" fill="rgba(0,0,0,0.08)"/>
  <!-- Windshield -->
  <rect x="145" y="152" width="20" height="13" rx="2" fill="rgba(140,200,255,0.8)"/>
  <!-- Rear window -->
  <rect x="146" y="177" width="18" height="12" rx="1" fill="rgba(100,160,210,0.65)"/>
  <!-- Racing stripe -->
  <rect x="153" y="148" width="4"  height="46" fill="rgba(255,255,255,0.25)"/>
  <!-- Wheels -->
  <rect x="136" y="155" width="7"  height="13" fill="#111" rx="2"/>
  <rect x="167" y="155" width="7"  height="13" fill="#111" rx="2"/>
  <rect x="136" y="174" width="7"  height="13" fill="#111" rx="2"/>
  <rect x="167" y="174" width="7"  height="13" fill="#111" rx="2"/>
  <!-- Headlights -->
  <rect x="145" y="148" width="7"  height="5"  fill="#fffaaa"/>
  <rect x="158" y="148" width="7"  height="5"  fill="#fffaaa"/>
  <!-- Headlight glow -->
  <ellipse cx="148" cy="145" rx="5" ry="3" fill="#ffffcc" opacity="0.5"/>
  <ellipse cx="162" cy="145" rx="5" ry="3" fill="#ffffcc" opacity="0.5"/>
  <!-- Taillights -->
  <rect x="145" y="189" width="7"  height="5"  fill="#ff3300"/>
  <rect x="158" y="189" width="7"  height="5"  fill="#ff3300"/>
  <!-- Nitro exhaust flame -->
  <ellipse cx="155" cy="197" rx="9"  ry="10" fill="rgba(0,255,170,0.7)"/>
  <ellipse cx="155" cy="199" rx="5"  ry="7"  fill="rgba(0,255,120,0.9)"/>

  <!-- Title bar at bottom -->
  <rect x="58" y="183" width="204" height="17" fill="rgba(0,0,0,0.65)"/>
  <text x="160" y="195" font-family="'Courier New',monospace" font-size="10" fill="#ffb060" text-anchor="middle" font-weight="bold" letter-spacing="1">🚔 POLICE CHASE</text>
</svg>
