<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle Slider – Fantasy Mini Games</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
</head>
<body>
  <div id="app" class="puzzle-app">
    <a href="index.html" class="btn-back">← Return to Tavern</a>
    <header>
      <h1>🧩 Puzzle Slider</h1>
      <p class="subtitle">Restore the ancient castle mosaic!</p>
    </header>

    <div id="puzzle-player-banner" class="player-turn-banner hidden"></div>

    <div id="puzzle-stats">
      <div class="stat-box"><span class="stat-label">Moves</span><span class="stat-value" id="puzzle-moves">0</span></div>
      <div class="stat-box"><span class="stat-label">Time</span><span class="stat-value" id="puzzle-time">0:00</span></div>
      <div class="stat-box"><span class="stat-label">Player</span><span class="stat-value" id="puzzle-player">P1</span></div>
    </div>

    <div id="puzzle-grid"></div>

    <div id="puzzle-message" class="hidden"></div>
    <div style="text-align:center;margin-top:8px;">
      <button id="btn-new-puzzle" class="btn-primary">🔀 New Game</button>
    </div>
  </div>
  <script src="puzzle.js"></script>
</body>
</html>
